databaseChangeLog:
  - changeSet:
        id: 1
        author: damian
        changes:
          - createTable:
              tableName: quotes
              columns:
                - column:
                    name: id
                    type: BIGINT
                    autoIncrement: true
                    constraints:
                      primaryKey: true
                      nullable: false
                - column:
                    name: author
                    type: VARCHAR(255)
                    constraints:
                      nullable: false
                - column:
                    name: text
                    type: VARCHAR(255)
                    constraints:
                      nullable: false
                - column:
                    name: is_vulgar
                    type: BOOLEAN
                    constraints:
                      nullable: false


  - changeSet:
        id: 2
        author: damian
        changes:
          - createTable:
              tableName: exercises_types
              columns:
                - column:
                    name: id
                    type: BIGINT
                    autoIncrement: true
                    constraints:
                      primaryKey: true
                      nullable: false
                - column:
                    name: name
                    type: VARCHAR(255)
                    constraints:
                      nullable: false
                - column:
                    name: image_id
                    type: BIGINT
                    constraints:
                      nullable: true


  - changeSet:
      id: 3
      author: damian
      changes:
        - createTable:
            tableName: exercises
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: image_id
                  type: BIGINT
                  constraints:
                    nullable: true
              - column:
                  name: video_id
                  type: BIGINT
                  constraints:
                    nullable: true
              - column:
                  name: exercise_type_id
                  type: BIGINT
                  constraints:
                    nullable: false


  - changeSet:
      id: 4
      author: damian
      changes:
        - createTable:
            tableName: media
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: url
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

  - changeSet:
      id: 5
      author: damian
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: username
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: password
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false


  - changeSet:
      id: 6
      author: damian
      changes:
        - addForeignKeyConstraint:
            baseTableName: exercises
            baseColumnNames: exercise_type_id
            constraintName: fk_exercises_exercise_type
            referencedTableName: exercises_types
            referencedColumnNames: id
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: exercises
            baseColumnNames: image_id
            constraintName: fk_exercises_image
            referencedTableName: media
            referencedColumnNames: id
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: exercises
            baseColumnNames: video_id
            constraintName: fk_exercises_video
            referencedTableName: media
            referencedColumnNames: id
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: exercises_types
            baseColumnNames: image_id
            constraintName: fk_exercises_types_image
            referencedTableName: media
            referencedColumnNames: id
            onDelete: CASCADE
