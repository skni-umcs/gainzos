version: '3.9'

services:
  db:
    image: postgres:17.6
    container_name: gainzos-db
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-gainzos}
      POSTGRES_USER: ${DATABASE_USERNAME:-gainzos}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-gainzos}
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - gainzos-net
    restart: unless-stopped

  server:
    image: registry.skni.umcs.pl/gainzos/gainzos/server:latest
    container_name: gainzos-server
    env_file:
      - .env
    depends_on:
      - db
    ports:
      - "3000:3000"
    volumes:
      - ./gainzos_data/apidata:/app/storage
    networks:
      - gainzos-net
    restart: unless-stopped

  web:
    image: registry.skni.umcs.pl/gainzos/gainzos/web:latest
    container_name: gainzos-web
    ports:
      - "3001:3001"
    env_file:
      - .env
    depends_on:
      - server
    networks:
      - gainzos-net
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: gainzos-nginx
    ports:
      - "80:80"
      - "8443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - web
      - server
    networks:
      - gainzos-net
    restart: unless-stopped

networks:
  gainzos-net:

volumes:
  pgdata:
  apidata:
  cloudbeaver: